    <style>
        /* Formal Exam Styling */
        :root {
            --text-color: #1a1a1a;
            --bg-color: #f4f4f9;
            --paper-color: #ffffff;
            --border-color: #cccccc;
            --highlight: #e0f2fe;
            --primary: #0369a1;
            --success: #15803d;
            --warning: #b45309;
            --danger: #b91c1c;
        }

        body {
            font-family: 'Times New Roman', Times, serif; /* Formal exam font */
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        /* Floating Timer Styling */
        #floating-timer {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            padding: 10px 25px;
            border-radius: 30px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 9999;
            border: 2px solid #38bdf8;
            letter-spacing: 2px;
        }

        .exam-paper {
            max-width: 900px;
            margin: 0 auto;
            background: var(--paper-color);
            padding: 40px 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Header Styles */
        .exam-header {
            border-bottom: 2px solid var(--text-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .exam-title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Section Styles */
        .section-title {
            font-size: 18px;
            font-weight: bold;
            background-color: #f3f4f6;
            padding: 5px 10px;
            margin: 30px 0 15px 0;
            border-left: 4px solid var(--primary);
        }

        .part-instructions {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .word-box {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: center;
            margin-bottom: 15px;
            font-style: italic;
            background-color: #fafafa;
        }

        .question {
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 5px;
        }

        .q-number {
            font-weight: bold;
            margin-right: 5px;
            min-width: 25px;
        }

        input[type="text"] {
            border: none;
            border-bottom: 1px dashed var(--text-color);
            background-color: var(--highlight);
            outline: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            padding: 2px 5px;
            color: var(--primary);
            font-weight: bold;
            width: 200px;
            transition: background-color 0.3s;
        }
        
        input[type="text"].long-input {
            width: 400px;
        }

        input[type="text"]:focus {
            background-color: #bae6fd;
            border-bottom: 1px solid var(--primary);
        }

        select {
            border: 1px dashed var(--text-color);
            background-color: var(--highlight);
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            padding: 2px;
            color: var(--primary);
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        /* Reading Text Box */
        .reading-text {
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 15px;
            background-color: #fafafa;
            line-height: 1.6;
            text-align: justify;
        }

        /* Hints */
        .hint-btn {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 12px;
            padding: 0 5px;
            text-decoration: underline;
        }
        .hint-btn:hover { color: var(--primary); }
        .hint-text {
            display: none;
            font-size: 13px;
            color: #854d0e;
            background-color: #fef08a;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 10px;
            font-family: Arial, sans-serif;
        }

        /* Submit Button */
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 40px;
            font-family: Arial, sans-serif;
            border-radius: 4px;
        }
        .submit-btn:hover { background-color: #0284c7; }

        /* Results Modal Styling (Hoja Flotante) */
        #results-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        #results-modal {
            background: white;
            padding: 40px;
            border-radius: 12px;
            max-width: 650px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            text-align: center;
            font-family: Arial, sans-serif;
        }
        
        .result-msg { font-size: 28px; font-weight: bold; margin-bottom: 10px; margin-top: 0; }
        
        .score-display {
            font-size: 55px;
            font-weight: bold;
            color: var(--primary);
            margin: 10px 0;
            line-height: 1;
        }

        .time-display {
            font-size: 20px;
            color: #4b5563;
            margin-top: 15px;
            margin-bottom: 25px;
            font-weight: bold;
            background: #f3f4f6;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
        }

        .logro-badge {
            display: inline-block;
            padding: 15px 30px;
            color: white;
            font-size: 26px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 5px;
            line-height: 1.4;
        }

        .stats-container {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            gap: 20px;
        }
        
        .stat-box {
            flex: 1;
            padding: 20px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
        }

        .modal-mistakes-list {
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 2px solid #e5e7eb;
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
        }

        .mistake-card {
            background-color: #fef2f2;
            border-left: 5px solid var(--danger);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .mistake-q { font-weight: bold; margin-bottom: 8px; color: #1f2937; }
        .wrong-ans { color: var(--danger); text-decoration: line-through; margin-right: 15px; font-weight: bold; }
        .correct-ans { color: var(--success); font-weight: bold; }

        .retake-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #1f2937;
            color: white;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        .retake-btn:hover { background-color: #111827; }

        @media (max-width: 768px) {
            .exam-paper { padding: 20px; }
            input[type="text"].long-input { width: 100%; }
            #floating-timer { font-size: 20px; top: 10px; right: 10px; padding: 8px 15px;}
            .stats-container { flex-direction: column; }
        }
    </style>
</head>

    // Función que baraja de forma aleatoria los arrays (Preguntas y Respuestas)
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;

    }

    function startTimer() {
        const timerEl = document.getElementById('floating-timer');
        timerEl.style.display = 'block';
        startTime = Date.now();
        
        timerInterval = setInterval(() => {
            let elapsed = Date.now() - startTime;
            let totalSeconds = Math.floor(elapsed / 1000);
            let minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            let seconds = (totalSeconds % 60).toString().padStart(2, '0');
            timerEl.innerText = `${minutes}:${seconds}`;
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        return document.getElementById('floating-timer').innerText;
    }

    function handleFirstInteraction() {
        if (!examStarted) {
            examStarted = true;
            requestFullScreen();
            startTimer();
        }
    }

    /* --- Core Exam Functions --- */
    function generateTextInput(qData, isLong) {
        const inputId = `q_input_${globalQuestionIndex}`;
        currentInputsMap[inputId] = { ans: qData.a, text: qData.q.replace(/<br>/g, " ") };
        
        let hintHtml = `<button type="button" class="hint-btn" onclick="toggleHint('hint_${inputId}')">(?)</button><span id="hint_${inputId}" class="hint-text">💡 Hint: ${qData.hint}</span>`;
        
        let className = isLong ? 'long-input' : '';
        let inputHtml = `<input type="text" id="${inputId}" class="${className}" autocomplete="off" spellcheck="false">`;
        
        let finalQ = qData.q.replace(/^\d+\.\s*/, '');
        finalQ = `<span class="q-number">${globalQuestionIndex}.</span> ` + finalQ;

        globalQuestionIndex++;
        return `<div class="question">${finalQ.replace('[BLANK]', inputHtml).replace('[BLANK_LONG]', inputHtml)} ${hintHtml}</div>`;
    }

    function renderExam() {
        globalQuestionIndex = 1;
        currentInputsMap = {};
        const container = document.getElementById('exam-content');
        container.innerHTML = '';

        const buildSection = (secData, isLong = false) => {
            let html = '';
            if (secData.title) html += `<div class="section-title">${secData.title}</div>`;
            if (secData.instructions) html += `<div class="part-instructions">${secData.instructions}</div>`;
            if (secData.wordBox) html += `<div class="word-box">${secData.wordBox}</div>`;
            
            let questions = shuffle([...secData.questions]);
            questions.forEach(q => { html += generateTextInput(q, isLong); });
            return html;
        };

        container.innerHTML += buildSection(examData.sec1A);
        container.innerHTML += buildSection(examData.sec1B, true);
        container.innerHTML += buildSection(examData.sec1C, true);
        container.innerHTML += buildSection(examData.sec2A);
        container.innerHTML += buildSection(examData.sec2B);

        // Section 2C
        let sec2C = examData.sec2C;
        let html2C = `<div class="part-instructions">${sec2C.instructions}</div>`;
        html2C += `<div class="word-box">${sec2C.wordBox}</div><div class="reading-text">`;
        
        for(let i=0; i<sec2C.textParts.length; i++) {
            html2C += sec2C.textParts[i];
            if(i < sec2C.answers.length) {
                const inputId = `q_input_${globalQuestionIndex}`;
                currentInputsMap[inputId] = { ans: sec2C.answers[i], text: "Weather paragraph blank " + (i+1) };
                html2C += ` <input type="text" id="${inputId}" autocomplete="off" spellcheck="false"> `;
                html2C += `<button type="button" class="hint-btn" onclick="toggleHint('hint_${inputId}')">(?)</button><span id="hint_${inputId}" class="hint-text" style="display:none; position:absolute;">💡 ${sec2C.hints[i]}</span> `;
                globalQuestionIndex++;
            }
        }
        html2C += `</div>`;
        container.innerHTML += html2C;

        container.innerHTML += buildSection(examData.sec3A);
        container.innerHTML += buildSection(examData.sec3B);
        container.innerHTML += buildSection(examData.sec4, true);

        // Section 5A (Reading Comprehension)
        let sec5 = examData.sec5;
        let html5 = `<div class="section-title">${sec5.title}</div>`;
        html5 += `<div class="part-instructions">${sec5.instructionsA}</div>`;
        html5 += `<div class="reading-text">${sec5.readingText}</div>`;
        
        let questions5A = shuffle([...sec5.questionsA]);
        questions5A.forEach(q => {
            const inputId = `q_input_${globalQuestionIndex}`;
            currentInputsMap[inputId] = { ans: q.a, text: q.q };
            
            let optsHtml = `<option value="">-- Select answer --</option>`;
            let shuffledOpts = shuffle([...q.options]);
            shuffledOpts.forEach(op => {
                optsHtml += `<option value="${op}">${op}</option>`;
            });
            
            html5 += `<div class="question" style="margin-bottom: 20px;">
                <span class="q-number">${globalQuestionIndex}.</span> ${q.q}<br>
                <select id="${inputId}" style="margin-top: 5px; width: 100%; max-width: 400px;">${optsHtml}</select>
            </div>`;
            globalQuestionIndex++;
        });

        // Section 5B (Writing Dropdowns)
        html5 += `<div class="part-instructions" style="margin-top: 30px;">${sec5.instructionsB}</div>`;
        html5 += `<div class="reading-text" style="line-height: 2.5;">`;
        
        for(let i=0; i<sec5.writingTextParts.length; i++) {
            html5 += sec5.writingTextParts[i];
            if(i < sec5.writingAnswers.length) {
                const inputId = `q_input_${globalQuestionIndex}`;
                currentInputsMap[inputId] = { ans: sec5.writingAnswers[i], text: `Writing blank #${i+1}` };
                
                let optsHtml = `<option value="">-- Choose --</option>`;
                let shuffledOpts = shuffle([...sec5.writingOptions[i]]);
                shuffledOpts.forEach(op => {
                    optsHtml += `<option value="${op}">${op}</option>`;
                });
                
                html5 += `<select id="${inputId}">${optsHtml}</select>`;
                globalQuestionIndex++;
            }
        }
        html5 += `</div>`;
        
        container.innerHTML += html5;
    }

    function gradeExam() {
        let score = 0;
        let total = Object.keys(currentInputsMap).length;
        let mistakesHtml = '';
        let incorrectCount = 0;

        for (const inputId in currentInputsMap) {
            const el = document.getElementById(inputId);
            const data = currentInputsMap[inputId];
            let userVal = el.value.trim().toLowerCase().replace(/\s+/g, ' '); // Normalize spaces

            let correctAnswers = data.ans.split('|').map(a => a.toLowerCase().trim());

            if (correctAnswers.includes(userVal)) {
                score++;
                el.style.backgroundColor = '#dcfce7'; // green tint
                el.style.color = '#166534';
            } else {
                incorrectCount++;
                el.style.backgroundColor = '#fee2e2'; // red tint
                el.style.color = '#991b1b';

                let userDisplay = el.value.trim() === '' ? '<i>(blank)</i>' : el.value;
                mistakesHtml += `
                <div class="mistake-card">
                    <div class="mistake-q">Question: ${data.text}</div>
                    <span class="wrong-ans">Your Answer: ${userDisplay}</span>
                    <span class="correct-ans">Correct: ${correctAnswers[0]}</span>
                </div>`;
            }
        }

        // Finalize Timer
        const timeTaken = stopTimer();

        // Calculate 0-20 grade based on the scale
        let grade20 = 0;
        let badgeText = "";
        let badgeColor = "";
        let msgEl = document.getElementById('modal-result-msg');

        if (score >= 53 && score <= 60) {
            grade20 = 18 + ((score - 53) * (2 / 7));
            badgeText = "AD - Outstanding Achievement";
            badgeColor = "#0284c7"; // Blue
            msgEl.innerText = 'Outstanding! 🎉';
        } else if (score >= 41 && score <= 52) {
            grade20 = 14 + ((score - 41) * (3 / 11));
            badgeText = "A - Expected Achievement";
            badgeColor = "#16a34a"; // Green
            msgEl.innerText = 'Good Job! 👍';
        } else if (score >= 31 && score <= 40) {
            grade20 = 11 + ((score - 31) * (2 / 9));
            badgeText = "B - In Process";
            badgeColor = "#d97706"; // Orange
            msgEl.innerText = 'You Passed! 📝';
        } else {
            grade20 = 0 + ((score - 0) * (10 / 30));
            badgeText = "C - Beginning";
            badgeColor = "#dc2626"; // Red
            msgEl.innerText = 'Keep Practicing! 💪';
        }

        grade20 = Math.round(grade20);
        let formattedGrade = grade20 < 10 ? `0${grade20}` : `${grade20}`;

        // Populate Modal Data
        document.getElementById('modal-total-pts').innerText = total;
        document.getElementById('modal-score-num').innerText = score;
        
        let gradeEl = document.getElementById('modal-grade-20');
        gradeEl.innerText = formattedGrade;
        gradeEl.style.color = badgeColor;

        document.getElementById('modal-time-num').innerText = timeTaken;
        document.getElementById('stat-correct').innerText = score;
        document.getElementById('stat-incorrect').innerText = incorrectCount;

        let badgeEl = document.getElementById('modal-logro-badge');
        badgeEl.innerText = badgeText;
        badgeEl.style.backgroundColor = badgeColor;

        const mistakesContent = document.getElementById('modal-mistakes-content');
        if (incorrectCount === 0) {
            mistakesContent.innerHTML = '<div style="padding: 15px; color: var(--success); font-weight: bold;">Perfect score! No mistakes to review.</div>';
        } else {
            mistakesContent.innerHTML = mistakesHtml;
        }

        document.getElementById('results-overlay').style.display = 'flex';
    }

    function startExam() {
        document.getElementById('results-overlay').style.display = 'none';
        
        // Reset Variables
        examStarted = false;
        clearInterval(timerInterval);
        document.getElementById('floating-timer').style.display = 'none';
        document.getElementById('floating-timer').innerText = '00:00';
        
        // Render New Exam (Shuffles Everything Again)
        renderExam();
        
        // Scroll to top
        window.scrollTo(0, 0);

        // Re-attach listeners just in case
        const examContent = document.getElementById('exam-content');
        examContent.removeEventListener('click', handleFirstInteraction);
        examContent.removeEventListener('input', handleFirstInteraction);
        examContent.removeEventListener('change', handleFirstInteraction);

        examContent.addEventListener('click', handleFirstInteraction);
        examContent.addEventListener('input', handleFirstInteraction);
        examContent.addEventListener('change', handleFirstInteraction);
    }

    // Initialize the exam on page load
    window.onload = startExam;

</script>
</body>
</html>
