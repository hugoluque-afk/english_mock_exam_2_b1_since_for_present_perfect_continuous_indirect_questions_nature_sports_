<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>English Exam - Level B1 | Mock Exam</title>
    <style>
        /* Formal Exam Styling with Interactive Background Variables */
        :root {
            --text-color: #1a1a1a;
            --paper-color: rgba(255, 255, 255, 0.96); /* Slight transparency for modern look */
            --border-color: #cccccc;
            --highlight: #e0f2fe;
            --primary: #0369a1;
            --success: #15803d;
            --warning: #b45309;
            --danger: #b91c1c;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
            min-height: 100vh;
            background-color: transparent; 
        }

        /* --- INTERACTIVE BACKGROUND STYLES --- */
        .interactive-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background: linear-gradient(-45deg, #0a2342, #175676, #b21f1f, #8e0e00, #4a0e4e);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        .interactive-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255, 255, 255, 0.25) 0%, rgba(0, 0, 0, 0) 40%);
            pointer-events: none;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* ------------------------------------ */

        /* Floating Timer Styling */
        #floating-timer {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: #ffffff;
            padding: 10px 25px;
            border-radius: 30px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 9999;
            border: 2px solid #38bdf8;
            letter-spacing: 2px;
        }

        .exam-paper {
            max-width: 900px;
            margin: 20px auto;
            background: var(--paper-color);
            padding: 40px 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 8px;
            position: relative;
            backdrop-filter: blur(10px);
        }

        /* Header Styles */
        .exam-header {
            border-bottom: 2px solid var(--text-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .exam-title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Section Styles */
        .section-title {
            font-size: 18px;
            font-weight: bold;
            background-color: rgba(243, 244, 246, 0.9);
            padding: 5px 10px;
            margin: 30px 0 15px 0;
            border-left: 4px solid var(--primary);
        }

        .part-instructions {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .word-box {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: center;
            margin-bottom: 15px;
            font-style: italic;
            background-color: rgba(250, 250, 250, 0.9);
        }

        .question {
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 5px;
        }

        .q-number {
            font-weight: bold;
            margin-right: 5px;
            min-width: 25px;
        }

        input[type="text"] {
            border: none;
            border-bottom: 1px dashed var(--text-color);
            background-color: var(--highlight);
            outline: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            padding: 2px 5px;
            color: var(--primary);
            font-weight: bold;
            width: 200px;
            transition: background-color 0.3s;
        }
        
        input[type="text"].long-input {
            width: 400px;
        }

        input[type="text"]:focus {
            background-color: #bae6fd;
            border-bottom: 1px solid var(--primary);
        }

        select {
            border: 1px dashed var(--text-color);
            background-color: var(--highlight);
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            padding: 2px;
            color: var(--primary);
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        /* Reading Text Box */
        .reading-text {
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 15px;
            background-color: rgba(250, 250, 250, 0.9);
            line-height: 1.6;
            text-align: justify;
        }

        /* Hints */
        .hint-btn {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 12px;
            padding: 0 5px;
            text-decoration: underline;
        }
        .hint-btn:hover { color: var(--primary); }
        .hint-text {
            display: none;
            font-size: 13px;
            color: #854d0e;
            background-color: #fef08a;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 10px;
            font-family: Arial, sans-serif;
        }

        /* Submit Button */
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 40px;
            font-family: Arial, sans-serif;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
        }
        .submit-btn:hover { 
            background-color: #0284c7; 
            transform: translateY(-2px);
        }

        /* Modals (Confirm & Results) Styling */
        .overlay-bg {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        .modal-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            max-width: 650px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            text-align: center;
            font-family: Arial, sans-serif;
        }
        
        /* Specific Confirm Modal Adjustments */
        #confirm-modal-box {
            max-width: 400px;
            padding: 30px;
        }

        .result-msg { font-size: 28px; font-weight: bold; margin-bottom: 10px; margin-top: 0; }
        
        .score-display {
            font-size: 55px;
            font-weight: bold;
            color: var(--primary);
            margin: 10px 0;
            line-height: 1;
        }

        .time-display {
            font-size: 20px;
            color: #4b5563;
            margin-top: 15px;
            margin-bottom: 25px;
            font-weight: bold;
            background: #f3f4f6;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
        }

        .logro-badge {
            display: inline-block;
            padding: 15px 30px;
            color: white;
            font-size: 26px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 5px;
            line-height: 1.4;
        }

        .stats-container {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            gap: 20px;
        }
        
        .stat-box {
            flex: 1;
            padding: 20px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
        }

        .modal-mistakes-list {
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 2px solid #e5e7eb;
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
        }

        .mistake-card {
            background-color: #fef2f2;
            border-left: 5px solid var(--danger);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .mistake-q { font-weight: bold; margin-bottom: 8px; color: #1f2937; }
        .wrong-ans { color: var(--danger); text-decoration: line-through; margin-right: 15px; font-weight: bold; }
        .correct-ans { color: var(--success); font-weight: bold; }

        .action-btn {
            display: block;
            width: 100%;
            padding: 15px;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .btn-gray { background-color: #6b7280; }
        .btn-gray:hover { background-color: #4b5563; }
        .btn-dark { background-color: #1f2937; }
        .btn-dark:hover { background-color: #111827; }

        @media (max-width: 768px) {
            .exam-paper { padding: 20px; margin: 10px; }
            input[type="text"].long-input { width: 100%; }
            #floating-timer { font-size: 20px; top: 10px; right: 10px; padding: 8px 15px;}
            .stats-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<!-- Dynamic Interactive Background Elements -->
<div class="interactive-bg"></div>
<div class="interactive-glow" id="interactive-glow"></div>

<div id="floating-timer">00:00</div>

<div class="exam-paper">
    <!-- Header del examen -->
    <div class="exam-header">
        <div class="exam-title">English Mock Exam - Level B1 | 2nd Grade</div>
    </div>

    <!-- Contenedor donde se inyectan las preguntas -->
    <div id="exam-content"></div>

    <button class="submit-btn" id="submit-btn" onclick="showConfirmModal()">Submit Exam</button>
</div>

<!-- Modal Personalizado de Confirmación (Reemplazo de "confirm()") -->
<div id="confirm-overlay" class="overlay-bg">
    <div id="confirm-modal-box" class="modal-box">
        <h2 style="margin-top: 0; color: #1f2937;">Submit Exam?</h2>
        <p style="font-size: 18px; color: #4b5563; margin-bottom: 25px;">Are you sure you want to finish and submit your answers?</p>
        <div style="display: flex; gap: 15px;">
            <button class="action-btn btn-gray" onclick="closeConfirmModal()">Cancel</button>
            <button class="action-btn" style="background-color: var(--primary);" onclick="executeGradeExam()">Yes, Submit</button>
        </div>
    </div>
</div>

<!-- Modal Flotante de Resultados -->
<div id="results-overlay" class="overlay-bg">
    <div id="results-modal" class="modal-box">
        <h2 id="modal-result-msg" class="result-msg"></h2>
        
        <div class="score-display">
            <span id="modal-score-num">0</span> 
            <span style="font-size: 30px; color: #6b7280;">/ 60 Pts</span>
        </div>
        
        <div id="modal-logro-badge" class="logro-badge"></div>
        
        <br>
        <div class="time-display">⏱️ Time Taken: <span id="modal-time-num">00:00</span></div>
        
        <!-- Diagnóstico Numérico -->
        <div class="stats-container">
            <div class="stat-box" style="background: #dcfce7; color: #166534; border: 2px solid #86efac;">
                ✅ Correct<br><span id="stat-correct" style="font-size: 45px;">0</span>
            </div>
            <div class="stat-box" style="background: #fee2e2; color: #991b1b; border: 2px solid #fca5a5;">
                ❌ Incorrect<br><span id="stat-incorrect" style="font-size: 45px;">0</span>
            </div>
        </div>

        <!-- Lista de errores -->
        <div id="modal-mistakes-container">
            <h3 style="color: var(--danger); border-bottom: 3px solid var(--danger); padding-bottom: 5px; text-align: left; margin-bottom: 15px;">📋 Mistakes Review</h3>
            <div id="modal-mistakes-content" class="modal-mistakes-list"></div>
        </div>

        <!-- Botones de Acción -->
        <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button class="action-btn" style="background-color: #0369a1; flex: 1;" onclick="document.getElementById('results-overlay').style.display='none'">Review Exam Paper</button>
            <button class="action-btn btn-dark" style="flex: 1;" onclick="startExam()">🔄 Retake Exam</button>
        </div>
    </div>
</div>

<script>
    // --- DATOS DEL EXAMEN ---
    const examData = {
        sec1A: {
            title: 'Section 1: Grammar - Present Perfect Continuous & "Since" / "For" (15 points)',
            instructions: 'A. Complete the sentences with Since or For. (5 points)',
            questions: [
                { q: "We have been exploring the humid forest [BLANK] three weeks.", a: "for", hint: "Periodo o cantidad de tiempo." },
                { q: "I haven't seen a wild predator [BLANK] 2019.", a: "since", hint: "Punto de inicio en el pasado." },
                { q: "She has been practicing for her skydiving test [BLANK] a long time.", a: "for", hint: "Expresión de duración." },
                { q: "It has been snowing heavily in the tundra [BLANK] Monday.", a: "since", hint: "Día de la semana específico." },
                { q: "They have been observing the nocturnal birds [BLANK] midnight.", a: "since", hint: "Hora exacta de inicio." }

        },
        sec1B: {

            questions: [
                { q: "(they / hike) [BLANK] through the canyon all morning?", a: "have they been hiking", hint: "Interrogativo con 'they'." },
                { q: "The marine biologists (not / study) [BLANK] the coral reefs due to the monsoon.", a: "haven't been studying|have not been studying", hint: "Negativo para plural." },
                { q: "She (prepare) [BLANK] for the white-water rafting trip since last month.", a: "has been preparing", hint: "Afirmativo para 'she'." },
                { q: "(how long / you / observe) [BLANK] those birds of prey?", a: "how long have you been observing", hint: "Pregunta con 'how long'." },
                { q: "We (not / camp) [BLANK] in the valley lately because of the thunderstorms.", a: "haven't been camping|have not been camping", hint: "Negativo para 'we'." }

        },
        sec1C: {
            instructions: 'C. Sentence Transformation: Rewrite the sentences using the Present Perfect Continuous and since or for. (5 points)',
            questions: [
                { q: "She started reading about amphibians at 10:00 AM. It is now 1:00 PM. (read)<br>She [BLANK_LONG].", a: "has been reading about amphibians for three hours|has been reading about amphibians since 10:00 am|has been reading for three hours", hint: "Usa Present Perfect Continuous + for/since." },
                { q: "We began exploring the plateau on Tuesday. It is still Tuesday, and we are still exploring. (explore)<br>We [BLANK_LONG].", a: "have been exploring the plateau since tuesday|have been exploring since tuesday", hint: "Usa Present Perfect Continuous + since." },
                { q: "He started feeling a thrill twenty minutes ago. (feel)<br>He [BLANK_LONG].", a: "has been feeling a thrill for twenty minutes|has been feeling a thrill for 20 minutes", hint: "Usa Present Perfect Continuous + for." },
                { q: "The tornado started forming an hour ago. It is still forming. (form)<br>The tornado [BLANK_LONG].", a: "has been forming for an hour", hint: "Usa Present Perfect Continuous + for." },
                { q: "How much time has passed since they started observing the carnivores? (How long / observe)<br>[BLANK_LONG]?", a: "how long have they been observing the carnivores|how long have they been observing", hint: "Empieza con 'How long...'" }
            ]
        },
        sec2A: {
            title: 'Section 2: Vocabulary - The Natural World (15 points)',
            instructions: 'A. Read the definitions and write the correct landscape or geography word from the box. There are two extra words. (5 points)',
            wordBox: 'Valley - Desert - Forest - Peninsula - Tundra - Plateau - Archipelago',
            questions: [
                { q: "A low area of land between hills or mountains, typically with a river flowing through it: [BLANK]", a: "valley", hint: "Valle." },
                { q: "A barren area of landscape where little precipitation occurs: [BLANK]", a: "desert", hint: "Desierto." },
                { q: "A large area covered chiefly with trees and undergrowth: [BLANK]", a: "forest", hint: "Bosque." },
                { q: "A piece of land almost surrounded by water or projecting out into a body of water: [BLANK]", a: "peninsula", hint: "Península." },

        sec2C: {

        sec5: {

            instructionsB: 'B. Writing (5 points)<br><span style="font-weight:normal; font-size:14px;"><em>Instruction: Complete this student\'s short paragraph describing an adventure by choosing the correct grammar and vocabulary words from the dropdowns.</em></span>',

                " over the Grand Canyon. Before jumping out of the plane, my instructor made sure my ",
                " was secure. The feeling of free-falling was a massive ",
                ". It was an amazing experience to see the vast ",
                " from high up in the air!"
            ],
            writingOptions: [
                ["dreamed", "am dreaming", "have been dreaming"],
                ["skydiving", "white-water rafting", "scuba diving"],
                ["life jacket", "parachute", "wetsuit"],
                ["drought", "adrenaline rush", "amphibian"],
                ["blizzard", "monsoon", "plateau"]
            ],
            writingAnswers: ["have been dreaming", "skydiving", "parachute", "adrenaline rush", "plateau"]
        }
    };

    let globalQuestionIndex = 1;
    let currentInputsMap = {}; 
    
    // Timer & Fullscreen variables
    let examStarted = false;
    let startTime;
    let timerInterval;

    // INTERACTIVE BACKGROUND LOGIC
    document.addEventListener('mousemove', function(e) {
        const glow = document.getElementById('interactive-glow');
        if(glow) {
            glow.style.setProperty('--x', e.clientX + 'px');
            glow.style.setProperty('--y', e.clientY + 'px');
        }
    });

    // Función que baraja de forma aleatoria los arrays
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function toggleHint(id) {
        const hintEl = document.getElementById(id);
        if (hintEl.style.display === 'inline-block') {
            hintEl.style.display = 'none';
        } else {
            hintEl.style.display = 'inline-block';
        }
    }

    /* --- Fullscreen & Timer Logic --- */
    function requestFullScreen() {
        let elem = document.documentElement;
        try {
            if (elem.requestFullscreen) {
                let req = elem.requestFullscreen();
                if(req !== undefined) req.catch(err => console.log(err));
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            }
        } catch(e) {}
    }

    function startTimer() {
        const timerEl = document.getElementById('floating-timer');
        timerEl.style.display = 'block';
        startTime = Date.now();
        
        timerInterval = setInterval(() => {
            let elapsed = Date.now() - startTime;
            let totalSeconds = Math.floor(elapsed / 1000);
            let minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            let seconds = (totalSeconds % 60).toString().padStart(2, '0');
            timerEl.innerText = `${minutes}:${seconds}`;
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        return document.getElementById('floating-timer').innerText;
    }

    function handleFirstInteraction() {
        if (!examStarted) {
            examStarted = true;
            requestFullScreen();
            startTimer();
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const examContent = document.getElementById('exam-content');
        examContent.addEventListener('click', handleFirstInteraction);
        examContent.addEventListener('input', handleFirstInteraction);
        examContent.addEventListener('change', handleFirstInteraction);
    });
    /* --------------------------------- */

    function generateTextInput(qData, isLong) {
        const inputId = `q_input_${globalQuestionIndex}`;
        currentInputsMap[inputId] = { ans: qData.a, text: qData.q.replace(/<br>/g, " ") };
        
        let hintHtml = `<button type="button" class="hint-btn" onclick="toggleHint('hint_${inputId}')">(?)</button><span id="hint_${inputId}" class="hint-text">💡 Hint: ${qData.hint}</span>`;
        
        let className = isLong ? 'long-input' : '';
        let inputHtml = `<input type="text" id="${inputId}" class="${className}" autocomplete="off" spellcheck="false">`;
        
        let finalQ = qData.q.replace(/^\d+\.\s*/, '');
        finalQ = `<span class="q-number">${globalQuestionIndex}.</span> ` + finalQ;

        globalQuestionIndex++;
        return `<div class="question">${finalQ.replace('[BLANK]', inputHtml).replace('[BLANK_LONG]', inputHtml)} ${hintHtml}</div>`;
    }

    function renderExam() {
        globalQuestionIndex = 1;
        currentInputsMap = {};
        const container = document.getElementById('exam-content');
        container.innerHTML = '';

        const buildSection = (secData, isLong = false) => {
            let html = '';
            if (secData.title) html += `<div class="section-title">${secData.title}</div>`;
            if (secData.instructions) html += `<div class="part-instructions">${secData.instructions}</div>`;
            if (secData.wordBox) html += `<div class="word-box">${secData.wordBox}</div>`;
            
            let questions = shuffle([...secData.questions]);
            questions.forEach(q => { html += generateTextInput(q, isLong); });
            return html;
        };

        container.innerHTML += buildSection(examData.sec1A);
        container.innerHTML += buildSection(examData.sec1B, true);
        container.innerHTML += buildSection(examData.sec1C, true);
        container.innerHTML += buildSection(examData.sec2A);
        container.innerHTML += buildSection(examData.sec2B);

        // Section 2C
        let sec2C = examData.sec2C;
        let html2C = `<div class="part-instructions">${sec2C.instructions}</div>`;
        html2C += `<div class="word-box">${sec2C.wordBox}</div><div class="reading-text">`;
        
        for(let i=0; i<sec2C.textParts.length; i++) {
            html2C += sec2C.textParts[i];
            if(i < sec2C.answers.length) {
                const inputId = `q_input_${globalQuestionIndex}`;
                currentInputsMap[inputId] = { ans: sec2C.answers[i], text: "Weather paragraph blank " + (i+1) };
                html2C += ` <input type="text" id="${inputId}" autocomplete="off" spellcheck="false"> `;
                html2C += `<button type="button" class="hint-btn" onclick="toggleHint('hint_${inputId}')">(?)</button><span id="hint_${inputId}" class="hint-text" style="display:none; position:absolute;">💡 ${sec2C.hints[i]}</span> `;
                globalQuestionIndex++;
            }
        }
        html2C += `</div>`;
        container.innerHTML += html2C;

        container.innerHTML += buildSection(examData.sec3A);
        container.innerHTML += buildSection(examData.sec3B);
        container.innerHTML += buildSection(examData.sec4, true);

        // Section 5A 
        let sec5 = examData.sec5;
        let html5 = `<div class="section-title">${sec5.title}</div>`;
        html5 += `<div class="part-instructions">${sec5.instructionsA}</div>`;
        html5 += `<div class="reading-text">${sec5.readingText}</div>`;
        
        let questions5A = shuffle([...sec5.questionsA]);
        questions5A.forEach(q => {
            const inputId = `q_input_${globalQuestionIndex}`;
            currentInputsMap[inputId] = { ans: q.a, text: q.q, isSelect: true };
            
            let optsHtml = `<option value="">-- Select answer --</option>`;
            let shuffledOpts = shuffle([...q.options]); 
            shuffledOpts.forEach(opt => {
                optsHtml += `<option value="${opt}">${opt}</option>`;
            });

            html5 += `<div class="question" style="display:block; margin-bottom:15px;">
                        <div style="font-weight:bold; margin-bottom:5px;"><span class="q-number">${globalQuestionIndex}.</span> ${q.q}</div>
                        <select id="${inputId}" style="width:100%; max-width:400px; padding:5px;">${optsHtml}</select>
                      </div>`;
            globalQuestionIndex++;
        });

        // Section 5B
        html5 += `<div class="part-instructions" style="margin-top:25px;">${sec5.instructionsB}</div>`;
        html5 += `<div class="reading-text" style="background-color:rgba(240, 253, 244, 0.9); border-color:#86efac;">`;
        
        for(let i=0; i<sec5.writingTextParts.length; i++) {
            html5 += sec5.writingTextParts[i];
            if(i < sec5.writingAnswers.length) {
                const inputId = `q_input_${globalQuestionIndex}`;
                currentInputsMap[inputId] = { ans: sec5.writingAnswers[i], text: "Writing paragraph blank " + (i+1), isSelect: true };
                
                let optsHtml = `<option value="">...</option>`;
                let shuffledOpts = shuffle([...sec5.writingOptions[i]]); 
                shuffledOpts.forEach(opt => {
                    optsHtml += `<option value="${opt}">${opt}</option>`;
                });

                html5 += `<select id="${inputId}">${optsHtml}</select>`;
                globalQuestionIndex++;
            }
        }
        html5 += `</div>`;
        
        container.innerHTML += html5;
    }

    // Modal Confirmation Logic (Replaces native confirm())
    function showConfirmModal() {
        document.getElementById('confirm-overlay').style.display = 'flex';
    }

    function closeConfirmModal() {
        document.getElementById('confirm-overlay').style.display = 'none';
    }

    function executeGradeExam() {
        closeConfirmModal(); // Cierra la pregunta de confirmación

        let finalTimeString = "00:00";
        try {
            finalTimeString = stopTimer();
            document.getElementById('modal-time-num').innerText = finalTimeString;
        } catch(e) { console.error("Timer error", e); }

        try {
            if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(err => console.log(err));
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        } catch(e) { console.log("No fullscreen to exit", e); }

        let score = 0;
        let incorrectCount = 0;
        let mistakesHTML = '';

        // Recolectar y calificar resultados
        for(let id in currentInputsMap) {
            let userElement = document.getElementById(id);
            if(!userElement) continue;

            let userAns = userElement.value.trim().toLowerCase().replace(/\s+/g, ' ');
            let data = currentInputsMap[id];
            let correctAnswers = data.ans.toLowerCase().split('|'); 
            
            let isCorrect = false;
            for(let i=0; i<correctAnswers.length; i++){
                if(userAns === correctAnswers[i].trim()) {
                    isCorrect = true;
                    break;
                }
            }

            if(isCorrect) {
                score++;
                userElement.style.backgroundColor = "#dcfce7"; 
                userElement.style.color = "#166534";
                if(!data.isSelect) userElement.style.borderBottomColor = "#166534";
            } else {
                incorrectCount++;
                userElement.style.backgroundColor = "#fee2e2"; 
                userElement.style.color = "#991b1b";
                if(!data.isSelect) userElement.style.borderBottomColor = "#991b1b";
                
                let displayUserAns = userAns === "" ? "(Blank)" : userElement.value;
                let displayCorrectAns = correctAnswers[0]; 

                mistakesHTML += `
                    <div class="mistake-card">
                        <div class="mistake-q">${data.text.replace(/<[^>]*>?/gm, '')}</div>
                        Your answer: <span class="wrong-ans">${displayUserAns}</span><br>
                        Correct answer: <span class="correct-ans">${displayCorrectAns}</span>
                    </div>
                `;
            }
            userElement.disabled = true; 
        }

        // Mostrar Resultados en la Pantalla Modal
        document.getElementById('modal-score-num').innerText = score;
        document.getElementById('stat-correct').innerText = score;
        document.getElementById('stat-incorrect').innerText = incorrectCount;
        document.getElementById('submit-btn').style.display = 'none';

        const resultsOverlay = document.getElementById('results-overlay');
        const resultMsg = document.getElementById('modal-result-msg');
        const logroBadge = document.getElementById('modal-logro-badge');
        const mistakesContent = document.getElementById('modal-mistakes-content');
        
        resultsOverlay.style.display = 'flex'; // ACTIVA LA VENTANA DE RESULTADOS

        // Escala de Puntos (Basado en 60 espacios/preguntas totales generadas)
        if (score >= 53) {
            resultMsg.innerText = "🎉 Outstanding Performance! 🎉";
            resultMsg.style.color = "var(--success)";
            logroBadge.innerHTML = "Achievement: AD (Outstanding)<br><span style='font-size: 18px; font-weight: normal;'>Equivalent: 18 - 20</span>";
            logroBadge.style.backgroundColor = "var(--success)";
        } else if (score >= 41) {
            resultMsg.innerText = "👏 Great Job! 👏";
            resultMsg.style.color = "var(--primary)";
            logroBadge.innerHTML = "Achievement: A (Expected)<br><span style='font-size: 18px; font-weight: normal;'>Equivalent: 14 - 17</span>";
            logroBadge.style.backgroundColor = "var(--primary)";
        } else if (score >= 31) {
            resultMsg.innerText = "👍 Good effort. Keep practicing.";
            resultMsg.style.color = "var(--warning)";
            logroBadge.innerHTML = "Achievement: B (In Progress)<br><span style='font-size: 18px; font-weight: normal;'>Equivalent: 11 - 13</span>";
            logroBadge.style.backgroundColor = "var(--warning)";
        } else {
            resultMsg.innerText = "📚 Needs improvement. Keep studying!";
            resultMsg.style.color = "var(--danger)";
            logroBadge.innerHTML = "Achievement: C (Beginning)<br><span style='font-size: 18px; font-weight: normal;'>Equivalent: 00 - 10</span>";
            logroBadge.style.backgroundColor = "var(--danger)";
        }

        if(mistakesHTML === "") {
            mistakesContent.innerHTML = "<h3 style='color:var(--success); text-align:center;'>Perfect Score! You have no mistakes.</h3>";
        } else {
            mistakesContent.innerHTML = mistakesHTML;
        }
    }

    function startExam() {
        examStarted = false;
        clearInterval(timerInterval);
        document.getElementById('floating-timer').style.display = 'none';
        document.getElementById('floating-timer').innerText = '00:00';
        
        document.getElementById('results-overlay').style.display = 'none';
        document.getElementById('confirm-overlay').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';

        renderExam();
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.onload = startExam;
</script>

</body>
</html>
